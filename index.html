<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A directory and full-screen browser for qb20nh game-like and webapp-like projects."
    />
    <title>qb20nh apps</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --panel: #ffffff;
        --panel-strong: #111111;
        --text: #111111;
        --muted: #666666;
        --line: #dddddd;
        --line-strong: #999999;
        --focus: #0066cc;
        --button-bg: #111111;
        --button-text: #ffffff;
        --back-bg: #111111;
        --back-text: #ffffff;
        font-family:
          system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111111;
          --panel: #181818;
          --panel-strong: #eeeeee;
          --text: #eeeeee;
          --muted: #aaaaaa;
          --line: #333333;
          --line-strong: #777777;
          --focus: #66aaff;
          --button-bg: #eeeeee;
          --button-text: #111111;
          --back-bg: #eeeeee;
          --back-text: #111111;
        }
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        background: var(--bg);
      }

      body {
        min-height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
      }

      body.viewer-open {
        overflow: hidden;
      }

      button,
      a {
        font: inherit;
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 36px;
      }

      .topbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--line);
      }

      .brand {
        display: grid;
        gap: 8px;
      }

      .eyebrow {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        max-width: 780px;
        margin: 0;
        font-size: 32px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .summary {
        max-width: 720px;
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.5;
      }

      .view-toggle {
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        min-width: 188px;
        padding: 3px;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: var(--panel);
      }

      .view-toggle button {
        min-height: 38px;
        border: 0;
        border-radius: 3px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-weight: 600;
      }

      .view-toggle button[aria-pressed="true"] {
        background: var(--button-bg);
        color: var(--button-text);
      }

      .directory {
        margin-top: 24px;
      }

      .directory.grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .directory.list {
        display: grid;
        gap: 10px;
      }

      .project-card {
        display: grid;
        gap: 14px;
        min-height: 0;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: var(--panel);
        transition: border-color 160ms ease;
      }

      .project-card:hover,
      .project-card:focus-within {
        border-color: var(--line-strong);
      }

      .directory.list .project-card {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        min-height: 0;
        gap: 16px;
      }

      .project-main {
        display: grid;
        gap: 8px;
      }

      .project-name {
        margin: 0;
        overflow-wrap: anywhere;
        font-size: 20px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .badge {
        display: inline-flex;
        width: fit-content;
        padding: 2px 6px;
        border: 1px solid var(--line);
        border-radius: 4px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.3;
      }

      .project-description {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.48;
      }

      .project-actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        align-self: end;
      }

      .action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 12px;
        border: 1px solid var(--button-bg);
        border-radius: 4px;
        cursor: pointer;
        font-weight: 600;
        text-decoration: none;
      }

      .action.open {
        background: var(--button-bg);
        color: var(--button-text);
      }

      .action:focus-visible,
      .view-toggle button:focus-visible,
      .back-control:focus-visible {
        outline: 2px solid var(--focus);
        outline-offset: 2px;
      }

      .viewer {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: none;
        background: #050505;
      }

      .viewer.is-open {
        display: block;
      }

      .viewer iframe {
        width: 100%;
        height: 100%;
        border: 0;
        background: white;
      }

      .back-control {
        position: fixed;
        z-index: 50;
        top: 18px;
        left: 18px;
        display: none;
        align-items: center;
        justify-content: center;
        width: 44px;
        height: 44px;
        border: 1px solid var(--line);
        border-radius: 50%;
        background: var(--back-bg);
        color: var(--back-text);
        cursor: grab;
        font-size: 22px;
        line-height: 1;
        touch-action: none;
        user-select: none;
      }

      .back-control.is-visible {
        display: inline-flex;
      }

      .back-control.is-dragging {
        cursor: grabbing;
        transition: none;
      }

      .back-control:not(.is-dragging) {
        transition:
          left 180ms ease,
          top 180ms ease;
      }

      .back-icon {
        line-height: 1;
      }

      @media (max-width: 760px) {
        .shell {
          width: min(100% - 24px, 1180px);
          padding-top: 20px;
        }

        .topbar {
          display: grid;
          align-items: start;
        }

        h1 {
          font-size: 28px;
          line-height: 1.15;
        }

        .view-toggle {
          width: 100%;
        }

        .directory.grid {
          grid-template-columns: 1fr;
        }

        .directory.list .project-card {
          grid-template-columns: minmax(0, 1fr) auto;
          gap: 12px;
          padding: 12px;
        }

        .directory.list .project-main {
          gap: 4px;
        }

        .directory.list .project-name {
          font-size: 16px;
        }

        .directory.list .project-description {
          font-size: 13px;
          line-height: 1.35;
        }

        .project-actions {
          width: 100%;
        }

        .action {
          flex: 1 1 128px;
        }

        .directory.list .project-actions {
          width: auto;
        }

        .directory.list .action {
          min-height: 32px;
          padding: 0 10px;
          flex: 0 0 auto;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell" aria-labelledby="page-title">
      <header class="topbar">
        <div class="brand">
          <p class="eyebrow">qb20nh</p>
          <h1 id="page-title">Games and webapps</h1>
        </div>
        <div class="view-toggle" aria-label="View mode">
          <button type="button" data-view="grid" aria-pressed="true">Grid</button>
          <button type="button" data-view="list" aria-pressed="false">List</button>
        </div>
      </header>

      <section class="directory grid" id="directory" aria-label="Project directory"></section>
    </main>

    <section class="viewer" id="viewer" aria-label="Project browser" aria-hidden="true">
      <iframe id="project-frame" title="Project preview" loading="eager"></iframe>
    </section>

    <button class="back-control" id="back-control" type="button" aria-label="Back to directory">
      <span class="back-icon" aria-hidden="true">&larr;</span>
    </button>

    <script>
      const directory = document.querySelector("#directory");
      const viewer = document.querySelector("#viewer");
      const frame = document.querySelector("#project-frame");
      const backControl = document.querySelector("#back-control");
      const toggleButtons = Array.from(document.querySelectorAll("[data-view]"));

      let projects = [];
      let projectById = new Map();
      let currentView = "grid";
      let activeProject = null;
      let dragState = null;
      let suppressClick = false;

      function renderProjects() {
        directory.className = `directory ${currentView}`;
        directory.innerHTML = projects.map(projectTemplate).join("");
      }

      async function loadProjects() {
        const response = await fetch("projects.json");
        projects = await response.json();
        projectById = new Map(projects.map((project) => [project.id, project]));
        renderProjects();

        syncProjectFromLocation();
      }

      function projectTemplate(project) {
        return `
          <article class="project-card">
            <div class="project-main">
              <h2 class="project-name">${escapeHtml(project.name)}</h2>
              <span class="badge">${escapeHtml(project.badge)}</span>
              <p class="project-description">${escapeHtml(project.description)}</p>
            </div>
            <div class="project-actions">
              <a class="action open" href="${escapeAttribute(project.path)}" data-open="${escapeHtml(project.id)}">
                Open
              </a>
            </div>
          </article>
        `;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeAttribute(value) {
        return escapeHtml(value).replace(/`/g, "&#096;");
      }

      function setView(view) {
        currentView = view;
        toggleButtons.forEach((button) => {
          button.setAttribute("aria-pressed", String(button.dataset.view === view));
        });
        renderProjects();
      }

      function openProject(project, options = {}) {
        activeProject = project;
        frame.title = `${project.name} preview`;
        viewer.classList.add("is-open");
        viewer.setAttribute("aria-hidden", "false");
        document.body.classList.add("viewer-open");
        backControl.classList.add("is-visible");
        placeBackControl();

        if (options.updateHistory && location.hash !== `#${project.id}`) {
          history.pushState({ projectId: project.id }, "", `#${project.id}`);
        }

        replaceFrameLocation(project.path);
      }

      function closeProject(options = {}) {
        activeProject = null;
        viewer.classList.remove("is-open");
        viewer.setAttribute("aria-hidden", "true");
        document.body.classList.remove("viewer-open");
        backControl.classList.remove("is-visible");
        replaceFrameLocation("about:blank");
        frame.removeAttribute("src");

        if (options.updateHistory && location.hash) {
          history.replaceState(null, "", location.pathname + location.search);
        }
      }

      function syncProjectFromLocation() {
        const id = location.hash.replace("#", "");
        if (!id) {
          closeProject({ updateHistory: false });
          return;
        }

        const project = projectById.get(id);
        if (!project) return;

        if (project !== activeProject) openProject(project);
      }

      function replaceFrameLocation(url) {
        try {
          frame.contentWindow.location.replace(url);
        } catch {
          frame.src = url;
        }
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function getSavedBackPosition() {
        try {
          return JSON.parse(localStorage.getItem("qb20nh.back-control") || "null");
        } catch {
          return null;
        }
      }

      function saveBackPosition(side, top) {
        try {
          localStorage.setItem(
            "qb20nh.back-control",
            JSON.stringify({ side, top }),
          );
        } catch {
          // Position persistence is optional.
        }
      }

      function placeBackControl() {
        const saved = getSavedBackPosition();
        const edgeInset = -8;
        const width = backControl.offsetWidth || 44;
        const height = backControl.offsetHeight || 44;
        const side = saved && saved.side === "right" ? "right" : "left";
        const top = clamp(saved && Number.isFinite(saved.top) ? saved.top : 18, 8, window.innerHeight - height - 8);
        const left = side === "right" ? window.innerWidth - width - edgeInset : edgeInset;

        backControl.dataset.side = side;
        backControl.style.left = `${left}px`;
        backControl.style.top = `${top}px`;
      }

      function snapBackControl() {
        const edgeInset = -8;
        const rect = backControl.getBoundingClientRect();
        const side = rect.left + rect.width / 2 < window.innerWidth / 2 ? "left" : "right";
        const left =
          side === "left" ? edgeInset : window.innerWidth - rect.width - edgeInset;
        const top = clamp(rect.top, 8, window.innerHeight - rect.height - 8);

        backControl.dataset.side = side;
        backControl.style.left = `${left}px`;
        backControl.style.top = `${top}px`;
        saveBackPosition(side, top);
      }

      directory.addEventListener("click", (event) => {
        const trigger = event.target.closest("[data-open]");
        if (!trigger) return;
        event.preventDefault();
        const project = projectById.get(trigger.dataset.open);
        if (project) openProject(project, { updateHistory: true });
      });

      toggleButtons.forEach((button) => {
        button.addEventListener("click", () => setView(button.dataset.view));
      });

      backControl.addEventListener("pointerdown", (event) => {
        if (!activeProject) return;

        const rect = backControl.getBoundingClientRect();
        dragState = {
          pointerId: event.pointerId,
          startX: event.clientX,
          startY: event.clientY,
          offsetX: event.clientX - rect.left,
          offsetY: event.clientY - rect.top,
          moved: false,
        };

        backControl.classList.add("is-dragging");
        backControl.setPointerCapture(event.pointerId);
      });

      backControl.addEventListener("pointermove", (event) => {
        if (!dragState || dragState.pointerId !== event.pointerId) return;

        const width = backControl.offsetWidth;
        const height = backControl.offsetHeight;
        const nextLeft = clamp(event.clientX - dragState.offsetX, 8, window.innerWidth - width - 8);
        const nextTop = clamp(event.clientY - dragState.offsetY, 8, window.innerHeight - height - 8);
        const distance = Math.hypot(event.clientX - dragState.startX, event.clientY - dragState.startY);

        if (distance > 4) dragState.moved = true;
        backControl.style.left = `${nextLeft}px`;
        backControl.style.top = `${nextTop}px`;
      });

      backControl.addEventListener("pointerup", (event) => {
        if (!dragState || dragState.pointerId !== event.pointerId) return;

        suppressClick = dragState.moved;
        backControl.classList.remove("is-dragging");
        backControl.releasePointerCapture(event.pointerId);

        if (dragState.moved) snapBackControl();
        dragState = null;
      });

      backControl.addEventListener("pointercancel", () => {
        if (!dragState) return;
        backControl.classList.remove("is-dragging");
        snapBackControl();
        dragState = null;
        suppressClick = true;
      });

      backControl.addEventListener("click", (event) => {
        if (suppressClick) {
          event.preventDefault();
          suppressClick = false;
          return;
        }

        closeProject({ updateHistory: true });
      });

      window.addEventListener("resize", () => {
        if (activeProject) placeBackControl();
      });

      window.addEventListener("popstate", syncProjectFromLocation);
      window.addEventListener("hashchange", syncProjectFromLocation);

      loadProjects();
    </script>
  </body>
</html>
